description: >-
  Sage HR (formerly CakeHR) is a cloud HRIS for small and mid-sized businesses, owned by Sage Group plc. It bundles core
  HR records, leave management, performance, recruitment (ATS), timesheets, shift scheduling, expenses, and
  onboarding/offboarding into a modular per-employee SaaS. The Sage HR REST API at apidoc.sage.hr exposes 53 operations
  across employees, leave, recruitment, performance, timesheets, documents, onboarding, offboarding, organization, and a
  Vikarina payroll integration bridge. Authentication is a tenant-scoped X-Auth-Token API key against the customer's own
  subdomain (https://{subdomain}.sage.hr/api).
